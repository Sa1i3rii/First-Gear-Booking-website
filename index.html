<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>First Gear - ระบบจองตำแหน่งทีมงาน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-red: #801818;
            --secondary-red: #A52A2A;
            --bg-light: #F5F7FA;
            --white: #ffffff;
            --text-dark: #333333;
            --badge-bg: #FFF9C4;
            --badge-text: #856404;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-light);
            margin: 0; padding: 0; color: var(--text-dark);
        }

        /* Header & Dashboard */
        .header {
            background-color: var(--primary-red);
            color: var(--white);
            padding: 60px 20px 40px;
        }

        .header-content { max-width: 1200px; margin: 0 auto; }
        .header h1 { margin: 0; font-size: 2.5rem; display: flex; align-items: center; gap: 15px; }
        .header h1 i { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; font-size: 1.5rem; }
        .header p { margin: 10px 0 30px; opacity: 0.9; font-size: 1.1rem; }

        .dashboard { display: flex; gap: 15px; flex-wrap: wrap; }
        .stat-card {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px 25px; border-radius: 15px; min-width: 120px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .stat-card h2 { margin: 0; font-size: 1.8rem; color: #FFEB3B; }
        .stat-card p { margin: 5px 0 0; font-size: 0.9rem; }

        /* Grid & Cards */
        .roles-grid {
            max-width: 1200px; margin: 40px auto; display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding: 0 20px;
        }

        .role-card {
            background: var(--white); border-radius: 25px; overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06); transition: 0.3s;
        }

        .card-header {
            background: var(--primary-red); color: var(--white); padding: 20px;
            display: flex; align-items: center;
        }

        .role-icon { font-size: 2rem; width: 50px; text-align: center; }
        .role-titles { flex: 1; margin-left: 15px; }
        .role-titles h3 { margin: 0; font-size: 1.2rem; }

        .card-body { padding: 20px; }

        .leader-info {
            background: var(--badge-bg); color: var(--badge-text);
            padding: 12px; border-radius: 12px; margin-bottom: 15px;
            font-size: 0.9rem; border: 1px solid #FFE082; display: flex; align-items: center; gap: 10px;
        }

        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--primary-red); transition: width 0.5s; }

        .card-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-booking {
            width: 100%; background: var(--primary-red); color: var(--white); border: none;
            padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem;
        }
        .btn-booking:disabled { background: #ccc; cursor: not-allowed; }
        .btn-view-members {
            width: 100%; background: none; border: 1px solid #ddd; color: #666;
            padding: 8px; border-radius: 10px; cursor: pointer; font-size: 0.85rem;
        }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content { background: var(--white); width: 90%; max-width: 450px; padding: 30px; border-radius: 25px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-content">
            <h1><i class="fas fa-cog"></i> First Gear</h1>
            <p>ระบบจองตำแหน่งทีมงานกิจกรรมนักศึกษา First Gear 🎯</p>
            <div class="dashboard">
                <div class="stat-card"><h2 id="stat-total">0</h2><p>ทั้งหมด</p></div>
                <div class="stat-card"><h2 id="stat-booked">0</h2><p>จองแล้ว</p></div>
                <div class="stat-card"><h2 id="stat-available">0</h2><p>ว่างอยู่</p></div>
            </div>
        </div>
    </div>

    <div class="roles-grid" id="roles-container"></div>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">จองตำแหน่ง</h2>
            <form id="bookingForm">
                <input type="hidden" id="selectedRole">
                <div style="margin-bottom:15px;"><label>ชื่อ *</label><input type="text" id="firstname" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;"></div>
                <div style="margin-bottom:15px;"><label>นามสกุล *</label><input type="text" id="lastname" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;"></div>
                <div style="margin-bottom:15px;"><label>รหัสนักศึกษา (8 หลัก) *</label><input type="number" id="studentId" required placeholder="เช่น 68000000" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;"></div>
                <div style="margin-bottom:15px;">
                    <label>ภาควิชา *</label>
                    <select id="department" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;"></select>
                </div>
                <div id="leaderSection" style="margin-bottom:15px;"></div>
                <div style="margin-bottom:15px;"><label>เหตุผลที่สนใจ *</label><textarea id="reason" rows="3" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;"></textarea></div>
                <div style="display:flex; gap:10px;">
                    <button type="button" onclick="closeModal()" style="flex:1; padding:12px; border:none; border-radius:10px; background:#eee;">ยกเลิก</button>
                    <button type="submit" id="submitBtn" style="flex:1; padding:12px; border:none; border-radius:10px; background:var(--primary-red); color:white;">ยืนยันการจอง</button>
                </div>
            </form>
        </div>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <i class="fas fa-check-circle" style="color: #28a745; font-size: 4rem; margin-bottom: 20px;"></i>
            <h2 style="color: #28a745; margin: 0 0 10px 0;">จองตำแหน่งสำเร็จ!</h2>
            <p style="margin-bottom: 20px; font-size: 0.95rem; color: #555;">กรุณาสแกนเข้ากลุ่มไลน์ทีมงาน<br>เพื่อคุยกับ Admin และรับข่าวสารครับ</p>
            
            <div style="background: #f9f9f9; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #eee;">
                <img src="image/Staffqr.png" alt="Line Group QR Code" style="width: 200px; height: 200px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                <p style="margin: 15px 0 0 0; font-weight: bold; color: #00b900;"><i class="fab fa-line"></i> LINE Group</p>
            </div>

            <button onclick="location.reload()" style="width: 100%; padding: 12px; border: none; border-radius: 12px; background: var(--primary-red); color: white; font-weight: bold; cursor: pointer;">
                เสร็จสิ้น
            </button>
        </div>
    </div>

    <script>
        // เปลี่ยน URL เป็นตัวล่าสุดที่คุณ Deploy ใน Google Apps Script (ตัวที่มี LockService)
        const scriptUrl = 'https://script.google.com/macros/s/AKfycby1vCHXofKAg1r1g7u_tTvnai4LV-kKmB1qlK9opaesiAm_EMWBP7v3hL-YIe2_BCSpDQ/exec'; 
        
        function getRoleIcon(name) {
            const n = name.toLowerCase();
            if (n.includes('กิจกรรม')) return 'fas fa-star';
            if (n.includes('mc') || n.includes('พิธีกร')) return 'fas fa-microphone';
            if (n.includes('photo') || n.includes('ตากล้อง')) return 'fas fa-camera';
            if (n.includes('video') || n.includes('ตัดต่อ')) return 'fas fa-video';
            if (n.includes('security') || n.includes('รักษาความปลอดภัย')) return 'fas fa-user-shield';
            if (n.includes('nurse') || n.includes('พยาบาล')) return 'fas fa-first-aid';
            if (n.includes('data')) return 'fas fa-database';
            if (n.includes('พัสดุ') || n.includes('สวัสดิการ')) return 'fas fa-box-open';
            if (n.includes('สถานที่')) return 'fas fa-map-marker-alt';
            if (n.includes('ประธาน') || n.includes('หัวหน้า')) return 'fas fa-crown';
            return 'fas fa-users';
        }

        async function fetchData() {
            const container = document.getElementById('roles-container');
            container.innerHTML = '<div style="grid-column: 1/-1; text-align:center;">กำลังโหลดข้อมูลล่าสุด...</div>';
            try {
                const response = await fetch(scriptUrl + '?t=' + new Date().getTime());
                const data = await response.json();
                document.getElementById('stat-total').innerText = data.summary.total;
                document.getElementById('stat-booked').innerText = data.summary.booked;
                document.getElementById('stat-available').innerText = data.summary.available;
                
                const deptSelect = document.getElementById('department');
                deptSelect.innerHTML = '<option value="">เลือกภาควิชา</option>' + data.departments.map(d => `<option value="${d}">${d}</option>`).join('');

                container.innerHTML = data.roles.map(role => {
                    const progress = (role.bookedSlot / role.totalSlot) * 100;
                    return `
                    <div class="role-card">
                        <div class="card-header">
                            <div class="role-icon"><i class="${getRoleIcon(role.roleName)}"></i></div>
                            <div class="role-titles"><h3>${role.roleName}</h3></div>
                        </div>
                        <div class="card-body">
                            ${role.hasLeader === 'Yes' ? `
                                <div class="leader-info"><i class="fas fa-check-circle" style="color:green;"></i> <div>มีหัวหน้ากลุ่มแล้ว</div></div>
                            ` : ''}
                            <div class="progress-container">
                                <small>รับสมัคร: ${role.bookedSlot}/${role.totalSlot} คน</small>
                                <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%;"></div></div>
                            </div>
                            <div class="card-actions">
                                <button class="btn-view-members"><i class="far fa-eye"></i> ดูรายชื่อสมาชิก</button>
                                <button class="btn-booking" onclick="openBooking('${role.roleName}', '${role.hasLeader}')" 
                                    ${role.availableSlot <= 0 ? 'disabled' : ''}>
                                    ${role.availableSlot <= 0 ? 'CLOSED' : 'จองตำแหน่งนี้'}
                                </button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) { container.innerHTML = 'เกิดข้อผิดพลาดในการโหลดข้อมูล'; }
        }

        function openBooking(roleName, hasLeader) {
            document.getElementById('selectedRole').value = roleName;
            document.getElementById('modalTitle').innerText = 'จองตำแหน่ง: ' + roleName;
            const leaderSection = document.getElementById('leaderSection');
            leaderSection.innerHTML = hasLeader === 'Yes' ? 
                '<div style="color:#d32f2f; font-size:0.85rem; padding:10px; background:#ffebee; border-radius:8px;">⚠️ ตำแหน่งนี้มีหัวหน้าแล้ว</div>' : 
                '<label style="display:flex; align-items:center; gap:8px; cursor:pointer;"><input type="checkbox" id="isLeader" style="width:18px; height:18px;"> 👑 สมัครเป็นหัวหน้ากลุ่ม</label>';
            document.getElementById('bookingModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('bookingModal').style.display = 'none'; }

        // --- ส่วนที่ปรับ Logic การบันทึก เพื่อแสดง Success Modal ---
        document.getElementById('bookingForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const studentId = document.getElementById('studentId').value;

            if (!studentId.startsWith('68') || studentId.length !== 8) {
                alert('รหัสนักศึกษาไม่ถูกต้อง! ต้องมี 8 หลัก และขึ้นต้นด้วย 68 เท่านั้น');
                return;
            }

            btn.innerText = 'กำลังบันทึก...'; 
            btn.disabled = true;

            const payload = {
                roleName: document.getElementById('selectedRole').value,
                firstname: document.getElementById('firstname').value,
                lastname: document.getElementById('lastname').value,
                studentId: studentId,
                department: document.getElementById('department').value,
                isLeader: document.getElementById('isLeader')?.checked || false,
                reason: document.getElementById('reason').value
            };
            
            try {
                const res = await fetch(scriptUrl, { method: 'POST', body: JSON.stringify(payload) });
                const resultText = await res.text();

                if (resultText === 'Success') { 
                    // เปลี่ยนจากการ Reload ทันที เป็นการปิดหน้าต่างจองแล้วเปิดหน้า QR Code แทน
                    closeModal(); 
                    document.getElementById('successModal').style.display = 'flex';
                } else if (resultText.includes("Duplicate")) {
                    alert('ขออภัย: รหัสนักศึกษานี้มีการจองในระบบอยู่แล้ว');
                    btn.disabled = false; btn.innerText = 'ยืนยันการจอง';
                } else { 
                    alert('เกิดข้อผิดพลาด: ' + resultText); 
                    btn.disabled = false; btn.innerText = 'ยืนยันการจอง'; 
                }
            } catch (err) {
                alert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
                btn.disabled = false; btn.innerText = 'ยืนยันการจอง';
            }
        };

        fetchData();
    </script>
</body>
</html>
